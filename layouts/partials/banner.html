<nav class="u-background">
  <div class="u-wrapper">
    <div class="Banner-title">
      <div class="Banner-item--title">
        <webpageTitle>{{ site.Title }}</webpageTitle>
      </div>
    <div class="Banner-container">
      <ul class = "Banner">
      {{ range .Site.Menus.main }}
        <li class="Banner-item">
          <a class="Banner-link u-clickable" href="{{ .Page.RelPermalink }}">{{ .Name }}</a>
        </li>

      {{ end }}
    </ul>
    
<div class="Banner-language-switcher">
  {{ range .Site.Languages }}
    {{ if eq .LanguageCode $.Site.Language.LanguageCode }}
      <span class="active language">{{ .LanguageName }}</span>
    {{ else }}
      <a href="{{ "/" | relLangURL }}" class="language">{{ .LanguageName }}</a>
    {{ end }}
  {{ end }}
</div>
 
  </div>

</div>
</nav>
